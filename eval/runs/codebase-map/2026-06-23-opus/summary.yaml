        about *why* each is risky (e.g., the RedisStore v7 API mismatch expecting
        a client not a URL, JWT_SECRET reuse limiting blast radius, hardcoded CORS
        blocking production), and cover multiple categories (missing files, security,
        configuration bugs, testing gaps). Non-obvious insights include the RedisStore
        initialization bug (a version-specific API detail), the session secret reuse
        concern, and the observation about slow query logging without connection pool
        configuration. Recommendations are prioritized (missing files first since
        the app can''t start), actionable (specifying exact files to create, suggesting
        specific libraries like express-validator or zod), and logically ordered.
        The overall organization is clean, well-structured, and immediately useful
        for onboarding a new developer.'
